version: '3.8'

services:
  api-gateway:
    build: ./apps/api-gateway-service
    ports:
      - "5000:5000"
      - "1883:1883" # MQTT
      - "1884:1884/udp" # MQTT-SN
    environment:
      - PORT=5000
      - NODE_ENV=production
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_TOKEN:-root}
    depends_on:
      - redis
      - vault
      - mqtt-broker

  vault:
    image: hashicorp/vault:latest
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=root
      - VAULT_ADDR=http://127.0.0.1:8200
    cap_add:
      - IPC_LOCK

  mqtt-broker:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"
      - "1884:1884/udp"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web-client:
    build: ./apps/web-client-roadsos
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

  edge-simulator:
    build: ./apps/edge-iot-firmware
    depends_on:
      - api-gateway
    environment:
      - GATEWAY_UDP_HOST=api-gateway
      - GATEWAY_UDP_PORT=1884
